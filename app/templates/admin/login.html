<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Webify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-rose-gold: #C59B85;
            --color-sage-green: #9CAF9A;
            --color-dusty-mauve: #B1A2B9;
            --color-slate-blue: #8A9BA8;
            --color-charcoal-black: #1A1E21;
        }
        body {
            background-color: var(--color-charcoal-black);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[var(--color-charcoal-black)]">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-[var(--color-rose-gold)] mb-2">Webify</h1>
            <p class="text-[var(--color-sage-green)]">Admin Dashboard</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-white bg-opacity-10 backdrop-blur-md rounded-2xl p-8 border border-white border-opacity-20">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-4 p-4 rounded-lg {% if category == 'success' %}bg-green-500 bg-opacity-20 text-green-300 border border-green-500 border-opacity-30{% elif category == 'error' %}bg-red-500 bg-opacity-20 text-red-300 border border-red-500 border-opacity-30{% else %}bg-blue-500 bg-opacity-20 text-blue-300 border border-blue-500 border-opacity-30{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <!-- Login Form -->
            <form method="POST" action="{{ url_for('main.admin_login') }}">
                <div class="space-y-6">
                    <!-- Username Field -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            required
                            class="w-full px-4 py-3 bg-white bg-opacity-10 border border-white border-opacity-20 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-[var(--color-rose-gold)] focus:ring-2 focus:ring-[var(--color-rose-gold)] focus:ring-opacity-50 transition-all"
                            placeholder="Enter your username"
                        >
                    </div>
                    
                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            class="w-full px-4 py-3 bg-white bg-opacity-10 border border-white border-opacity-20 rounded-xl text-white placeholder-gray-400 focus:outline-none focus:border-[var(--color-rose-gold)] focus:ring-2 focus:ring-[var(--color-rose-gold)] focus:ring-opacity-50 transition-all"
                            placeholder="Enter your password"
                        >
                    </div>
                    
                    <!-- Submit Button -->
                    <button 
                        type="submit"
                        class="w-full py-3 bg-[var(--color-rose-gold)] text-[var(--color-charcoal-black)] font-bold rounded-xl hover:bg-opacity-90 transition-all transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-[var(--color-rose-gold)] focus:ring-opacity-50"
                    >
                        Login
                    </button>
                </div>
            </form>
            
            <!-- Back to Home -->
            <div class="mt-6 text-center">
                <a href="{{ url_for('main.index') }}" class="text-[var(--color-slate-blue)] hover:text-[var(--color-rose-gold)] transition-colors text-sm">
                    ← Back to Home
                </a>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-8 text-gray-500 text-sm">
            <p>© 2024 Webify. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
